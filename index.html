<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>接水樂園</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #f5f0eb;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      touch-action: none;
    }
    canvas { display: block; }
  </style>
</head>
<body>
  <canvas id="game"></canvas>
  <script>
    // 佈局座標（邏輯像素）
    const MACHINE     = { x: 80,  y: 60,  w: 230, h: 180 };
    const SLIDE_START = { x: 75,  y: 185 };
    const SLIDE_END   = { x: 200, y: 435 };
    const CUP         = { x: 145, y: 615, w: 100, h: 120 };
    const BLOCKER     = { w: 48, h: 8, y: 475, minCX: 115, maxCX: 285 };
    const SPIN_CX     = CUP.x + CUP.w / 2;  // 旋轉中心 x = 195
    const SPIN_ARM    = 35;
    const COLLECTOR   = { x: 155, y: 515, w: 80, h: 45 };
    const POUR_RATE   = 1 / 90;

    // 顏色
    const C = {
      bg:         '#f5f0eb',
      machineFill:'#e8e0d8',
      gold:       '#c9a84c',
      water:      '#7ec8e3',
      cupStroke:  'rgba(160,210,240,0.9)',
      targetLine: '#ff6b6b',
      text:       '#5a4a3a',
    };

    // 杯型定義（widthAt(t)：t=0 底部, t=1 頂部，回傳寬度 px）
    const CUPS = {
      round:     { widthAt(t) { return 100; } },
      straight:  { widthAt(t) { return 90; } },
      wide:      { widthAt(t) { return 70 + 50 * t; } },
      taper:     { widthAt(t) { return 120 - 50 * t; } },
      hourglass: { widthAt(t) { return 60 + 55 * Math.pow(Math.abs(t - 0.5) * 2, 2); } },
      irregular: { widthAt(t) { return 85 + 20 * Math.sin(t * Math.PI * 3); } },
    };

    // 關卡設定
    const LEVELS = [
      { target: 0.40, rate: 0.0020, tolerance: 0.050, blockerSpeed: 0.0, cup: CUPS.round },
      { target: 0.70, rate: 0.0025, tolerance: 0.045, blockerSpeed: 0.5, cup: CUPS.straight },
      { target: 0.30, rate: 0.0030, tolerance: 0.040, blockerSpeed: 0.9, cup: CUPS.wide },
      { target: 0.80, rate: 0.0035, tolerance: 0.035, blockerSpeed: 1.4, cup: CUPS.taper },
      { target: 0.55, rate: 0.0040, tolerance: 0.030, blockerSpeed: 0.04, blockerMode: 'spin', cup: CUPS.hourglass },
      { target: 0.85, rate: 0.0050, tolerance: 0.020, blockerSpeed: 0.06, blockerMode: 'spin', cup: CUPS.irregular },
    ];

    // 遊戲狀態
    const state = {
      fillLevel:       0,
      collectedLevel:  0,
      gameState:       'SELECT',
      isPouring:       false,
      loseReason:      '',
      currentLevel:    0,
      maxUnlocked:     0,
      particles:       [],
      splashes:        [],
      time:            0,
      waveAmp:         0,
      winTime:         0,
      blockerX:        195,
      blockerDir:      1,
      blockerAngle:    0,
    };

    const lvl = () => LEVELS[state.currentLevel];

    function readProgress() {
      try { return parseInt(localStorage.getItem('waterGame_maxUnlocked') || '0', 10); }
      catch (e) { return 0; }
    }
    function saveProgress(v) {
      try { localStorage.setItem('waterGame_maxUnlocked', String(v)); } catch (e) {}
    }
    state.maxUnlocked = readProgress();

    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');

    const bgImg = new Image();
    bgImg.src = '科技背景.png';
    let bgLoaded = false;
    bgImg.onload = () => { bgLoaded = true; };

    function roundRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
    const DPR = window.devicePixelRatio || 1;
    const LW = 390;
    const LH = 844;

    function resize() {
      const scale = Math.min(window.innerWidth / LW, window.innerHeight / LH);
      canvas.style.width  = (LW * scale) + 'px';
      canvas.style.height = (LH * scale) + 'px';
      canvas.width  = LW * scale * DPR;
      canvas.height = LH * scale * DPR;
      ctx.setTransform(scale * DPR, 0, 0, scale * DPR, 0, 0);
    }
    resize();
    window.addEventListener('resize', resize);

    function drawBackground() {
      if (bgLoaded) {
        const iw = bgImg.naturalWidth, ih = bgImg.naturalHeight;
        const scale = Math.max(LW / iw, LH / ih);
        const dw = iw * scale, dh = ih * scale;
        ctx.drawImage(bgImg, (LW - dw) / 2, (LH - dh) / 2, dw, dh);
      } else {
        ctx.fillStyle = C.bg;
        ctx.fillRect(0, 0, LW, LH);
      }
      // 白霧層：讓遊戲元素更清晰
      ctx.fillStyle = 'rgba(255,255,255,0.35)';
      ctx.fillRect(0, 0, LW, LH);
    }

    function drawMachine() {
      const { x, y, w, h } = MACHINE;
      const g = ctx.createLinearGradient(x, y, x + w, y + h);
      g.addColorStop(0, '#ede5da');
      g.addColorStop(1, '#d4cbbf');
      roundRect(x, y, w, h, 20);
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = C.gold;
      ctx.lineWidth = 3;
      ctx.stroke();

      roundRect(x + 65, y + 12, 140, 38, 10);
      ctx.fillStyle = '#3a3230';
      ctx.fill();
      ctx.font = 'bold 15px sans-serif';
      ctx.fillStyle = '#f0d070';
      ctx.textAlign = 'center';
      ctx.fillText('接水樂園', x + 135, y + 28);
      ctx.font = '9px sans-serif';
      ctx.fillStyle = '#9a8a70';
      ctx.fillText('WATER PARK', x + 135, y + 42);

      ctx.font = 'bold 10px sans-serif';
      ctx.fillStyle = C.text;
      ctx.textAlign = 'center';
      ctx.fillText('ON', x + 18, y + 40);
      ctx.fillText('開', x + 18, y + 54);

      roundRect(x + 30, y + 95, 50, 50, 10);
      ctx.fillStyle = '#f0ebe3';
      ctx.fill();
      ctx.strokeStyle = C.gold;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.arc(x + 55, y + 125, 8, 0, Math.PI * 2);
      ctx.fillStyle = C.water;
      ctx.fill();

      ctx.beginPath();
      ctx.arc(SLIDE_START.x, SLIDE_START.y, 12, 0, Math.PI * 2);
      ctx.fillStyle = '#ccc4b8';
      ctx.fill();
      ctx.strokeStyle = C.gold;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawSlide() {
      const sx = SLIDE_START.x, sy = SLIDE_START.y;
      const ex = SLIDE_END.x,   ey = SLIDE_END.y;
      const sw = 22;
      const len = Math.hypot(ex - sx, ey - sy);
      const nx = -(ey - sy) / len;
      const ny =  (ex - sx) / len;

      ctx.beginPath();
      ctx.moveTo(sx + nx * sw / 2, sy + ny * sw / 2);
      ctx.lineTo(ex + nx * sw / 2, ey + ny * sw / 2);
      ctx.lineTo(ex - nx * sw / 2, ey - ny * sw / 2);
      ctx.lineTo(sx - nx * sw / 2, sy - ny * sw / 2);
      ctx.closePath();

      const g = ctx.createLinearGradient(sx, sy, ex, ey);
      g.addColorStop(0, '#d8d0c5');
      g.addColorStop(1, '#c5bdb2');
      ctx.fillStyle = g;
      ctx.fill();
      ctx.strokeStyle = C.gold;
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function cupPath(cup) {
      const { x, y, w, h } = CUP;
      const cx = x + w / 2;
      const r = 8;
      const N = 32;
      ctx.beginPath();
      for (let i = 0; i <= N; i++) {
        const t = 1 - i / N;
        const halfW = cup.widthAt(t) / 2;
        const py = y + (i / N) * (h - r);
        if (i === 0) ctx.moveTo(cx - halfW, py);
        else ctx.lineTo(cx - halfW, py);
      }
      const bHW = cup.widthAt(0) / 2;
      ctx.quadraticCurveTo(cx - bHW, y + h, cx - bHW + r, y + h);
      ctx.lineTo(cx + bHW - r, y + h);
      ctx.quadraticCurveTo(cx + bHW, y + h, cx + bHW, y + h - r);
      for (let i = N; i >= 0; i--) {
        const t = 1 - i / N;
        const halfW = cup.widthAt(t) / 2;
        const py = y + (i / N) * (h - r);
        ctx.lineTo(cx + halfW, py);
      }
      ctx.closePath();
    }

    function drawCupFill(cup) {
      cupPath(cup);
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.fill();
    }

    function drawCupBorder(cup) {
      cupPath(cup);
      ctx.strokeStyle = 'rgba(140,200,240,1.0)';
      ctx.lineWidth = 3;
      ctx.stroke();
    }

    function drawCollector() {
      const { x, y, w, h } = COLLECTOR;
      const cx = x + w / 2;
      roundRect(x, y, w, h, 6);
      ctx.fillStyle = 'rgba(230,222,210,0.9)';
      ctx.fill();
      ctx.strokeStyle = C.gold;
      ctx.lineWidth = 2;
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(cx - 7, y + h);
      ctx.lineTo(cx + 7, y + h);
      ctx.lineTo(cx + 4, y + h + 10);
      ctx.lineTo(cx - 4, y + h + 10);
      ctx.closePath();
      ctx.fillStyle = 'rgba(210,200,185,0.9)';
      ctx.fill();
      ctx.strokeStyle = C.gold;
      ctx.lineWidth = 1.5;
      ctx.stroke();
      ctx.font = '9px sans-serif';
      ctx.fillStyle = C.text;
      ctx.textAlign = 'center';
      ctx.fillText('集水站', cx, y - 4);
    }

    function drawCollectorWater() {
      if (state.collectedLevel <= 0) return;
      const { x, y, w, h } = COLLECTOR;
      const waterTopY = y + h * (1 - state.collectedLevel);
      ctx.save();
      roundRect(x + 2, y + 2, w - 4, h - 4, 5);
      ctx.clip();
      const g = ctx.createLinearGradient(0, waterTopY, 0, y + h);
      g.addColorStop(0, '#7ec8e3');
      g.addColorStop(1, '#5ab0d0');
      ctx.fillStyle = g;
      ctx.fillRect(x, waterTopY, w, h);
      ctx.restore();
    }

    function drawPourStream() {
      if (state.gameState !== 'POURING' || state.collectedLevel <= 0) return;
      const cx = COLLECTOR.x + COLLECTOR.w / 2;
      const fromY = COLLECTOR.y + COLLECTOR.h + 10;
      const toY = CUP.y + CUP.h * (1 - state.fillLevel);
      if (toY <= fromY) return;
      const streamW = Math.max(2, 6 * state.collectedLevel);
      const g = ctx.createLinearGradient(0, fromY, 0, toY);
      g.addColorStop(0, 'rgba(126,200,227,0.9)');
      g.addColorStop(1, 'rgba(90,176,208,0.4)');
      ctx.fillStyle = g;
      ctx.fillRect(cx - streamW / 2, fromY, streamW, toY - fromY);
    }

    function drawCupMini(cup, cx, topY, h, scale) {
      const r = 5;
      const N = 24;
      ctx.beginPath();
      for (let i = 0; i <= N; i++) {
        const t = 1 - i / N;
        const halfW = (cup.widthAt(t) / 2) * scale;
        const py = topY + (i / N) * (h - r);
        if (i === 0) ctx.moveTo(cx - halfW, py);
        else ctx.lineTo(cx - halfW, py);
      }
      const bHW = (cup.widthAt(0) / 2) * scale;
      ctx.quadraticCurveTo(cx - bHW, topY + h, cx - bHW + r, topY + h);
      ctx.lineTo(cx + bHW - r, topY + h);
      ctx.quadraticCurveTo(cx + bHW, topY + h, cx + bHW, topY + h - r);
      for (let i = N; i >= 0; i--) {
        const t = 1 - i / N;
        const halfW = (cup.widthAt(t) / 2) * scale;
        const py = topY + (i / N) * (h - r);
        ctx.lineTo(cx + halfW, py);
      }
      ctx.closePath();
    }

    const MINI_SCALE = 70 / 120;
    const MINI_CUP_H = 62;

    const SEL = {
      tW: 140, tH: 160, gap: 20,
      get startX() { return (LW - (2 * this.tW + this.gap)) / 2; },
      get startY() { return (LH - (3 * this.tH + 2 * this.gap)) / 2; },
    };

    function tileRect(i) {
      const col = i % 2, row = Math.floor(i / 2);
      return {
        x: SEL.startX + col * (SEL.tW + SEL.gap),
        y: SEL.startY + row * (SEL.tH + SEL.gap),
        w: SEL.tW, h: SEL.tH,
      };
    }

    function drawLevelSelect() {
      ctx.fillStyle = 'rgba(245,240,235,0.93)';
      ctx.fillRect(0, 0, LW, LH);

      ctx.font = 'bold 26px sans-serif';
      ctx.fillStyle = C.text;
      ctx.textAlign = 'center';
      ctx.fillText('選擇關卡', LW / 2, SEL.startY - 28);

      for (let i = 0; i < LEVELS.length; i++) {
        const { x, y, w, h } = tileRect(i);
        const unlocked = i <= state.maxUnlocked;
        const cleared  = i < state.maxUnlocked;

        roundRect(x, y, w, h, 14);
        ctx.fillStyle = unlocked ? 'rgba(255,255,255,0.92)' : 'rgba(180,180,180,0.35)';
        ctx.fill();
        ctx.strokeStyle = cleared ? C.gold : (unlocked ? 'rgba(126,200,227,0.9)' : 'rgba(160,160,160,0.4)');
        ctx.lineWidth = cleared ? 2.5 : 1.5;
        ctx.stroke();

        ctx.save();
        if (!unlocked) ctx.globalAlpha = 0.25;
        drawCupMini(LEVELS[i].cup, x + w / 2, y + 18, MINI_CUP_H, MINI_SCALE);
        ctx.fillStyle = 'rgba(230,245,255,0.85)';
        ctx.fill();
        ctx.strokeStyle = cleared ? C.gold : 'rgba(120,180,220,0.8)';
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();

        ctx.font = 'bold 13px sans-serif';
        ctx.fillStyle = unlocked ? C.text : '#aaa';
        ctx.textAlign = 'center';
        ctx.fillText('Level ' + (i + 1), x + w / 2, y + h - 30);

        ctx.font = '16px sans-serif';
        ctx.textAlign = 'center';
        if (cleared) {
          ctx.fillStyle = C.gold;
          ctx.fillText('★', x + w / 2, y + h - 10);
        } else if (unlocked) {
          ctx.font = '11px sans-serif';
          ctx.fillStyle = '#8a7a6a';
          ctx.fillText('點擊開始', x + w / 2, y + h - 10);
        } else {
          ctx.fillText('🔒', x + w / 2, y + h - 10);
        }
      }
    }

    function drawTargetLine(cup) {
      const { x, y, w, h } = CUP;
      const cx = x + w / 2;
      const lineY = y + h * (1 - lvl().target);
      const halfW = cup.widthAt(lvl().target) / 2;
      ctx.save();
      ctx.setLineDash([6, 4]);
      ctx.strokeStyle = C.targetLine;
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - halfW + 6, lineY);
      ctx.lineTo(cx + halfW - 6, lineY);
      ctx.stroke();
      ctx.restore();
      ctx.font = '10px sans-serif';
      ctx.fillStyle = C.targetLine;
      ctx.textAlign = 'right';
      ctx.fillText('目標', cx - halfW - 5, lineY + 4);
    }

    function updateWater() {
      if (state.gameState === 'POURING') {
        const transfer = Math.min(POUR_RATE, state.collectedLevel);
        state.collectedLevel = Math.max(0, state.collectedLevel - transfer);
        state.fillLevel      = Math.min(1, state.fillLevel + transfer);
        state.waveAmp = Math.min(6, state.waveAmp + 0.3);
        if (state.fillLevel >= 1) {
          state.collectedLevel = 0;
          state.gameState  = 'GAME_OVER';
          state.loseReason = 'overflow';
        } else if (state.collectedLevel <= 0) {
          checkWinLose();
        }
      } else if (state.isPouring && state.gameState === 'PLAYING') {
        state.waveAmp = Math.min(6, state.waveAmp + 0.5);
      } else {
        state.waveAmp = Math.max(0, state.waveAmp - 0.15);
      }
      if (state.gameState === 'WIN') state.winTime += 1 / 60;
    }

    function drawWater(cup) {
      if (state.fillLevel <= 0) return;
      const { x, y, w, h } = CUP;
      const cx = x + w / 2;
      const waterTopY = y + h * (1 - state.fillLevel);
      const halfW = cup.widthAt(state.fillLevel) / 2;

      ctx.save();
      cupPath(cup);
      ctx.clip();

      const OVER = 70;
      ctx.beginPath();
      ctx.moveTo(cx - OVER, waterTopY);
      ctx.lineTo(cx - halfW, waterTopY);
      for (let px = cx - halfW; px <= cx + halfW; px++) {
        const wy = waterTopY + Math.sin((px - cx) * 0.1 + state.time * 3) * state.waveAmp;
        ctx.lineTo(px, wy);
      }
      ctx.lineTo(cx + OVER, waterTopY);
      ctx.lineTo(cx + OVER, y + h + OVER);
      ctx.lineTo(cx - OVER, y + h + OVER);
      ctx.closePath();

      const g = ctx.createLinearGradient(x, waterTopY, x, y + h);
      g.addColorStop(0, '#ff9800');
      g.addColorStop(1, '#e65100');
      ctx.fillStyle = g;
      ctx.fill();

      ctx.strokeStyle = 'rgba(255,220,100,0.8)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - halfW, waterTopY);
      for (let px = cx - halfW; px <= cx + halfW; px++) {
        const wy = waterTopY + Math.sin((px - cx) * 0.1 + state.time * 3) * state.waveAmp;
        ctx.lineTo(px, wy);
      }
      ctx.stroke();

      ctx.restore();
    }

    function spawnParticles() {
      for (let i = 0; i < 2; i++) {
        state.particles.push({
          x: SLIDE_END.x + (Math.random() - 0.5) * 6,
          y: SLIDE_END.y,
          vx: (Math.random() - 0.5) * 1.5,
          vy: 1 + Math.random() * 2,
          r: 4 + Math.random() * 4,
          life: 0,
          maxLife: 55 + Math.random() * 20,
        });
      }
      if (state.particles.length > 100)
        state.particles.splice(0, state.particles.length - 100);
    }

    function spawnSplash(x, y) {
      for (let i = 0; i < 3; i++) {
        state.splashes.push({
          x: x + (Math.random() - 0.5) * 10,
          y,
          r: 2,
          maxR: 8 + Math.random() * 6,
          life: 0,
          maxLife: 18,
        });
      }
    }

    function updateBlocker() {
      if (state.gameState !== 'PLAYING' && state.gameState !== 'READY') return;
      const speed = lvl().blockerSpeed;
      if (!speed) return;
      if (lvl().blockerMode === 'spin') {
        state.blockerAngle = (state.blockerAngle + speed) % (Math.PI * 2);
      } else {
        state.blockerX += speed * state.blockerDir;
        if (state.blockerX >= BLOCKER.maxCX || state.blockerX <= BLOCKER.minCX) {
          state.blockerDir *= -1;
        }
      }
    }

    function drawBlocker() {
      if (!lvl().blockerSpeed) return;
      const { h, y } = BLOCKER;
      if (lvl().blockerMode === 'spin') {
        ctx.save();
        ctx.translate(SPIN_CX, y);
        ctx.rotate(state.blockerAngle);
        roundRect(-SPIN_ARM, -h / 2, SPIN_ARM * 2, h, 3);
        ctx.fillStyle = '#8a7a6a';
        ctx.fill();
        ctx.strokeStyle = C.gold;
        ctx.lineWidth = 1.5;
        ctx.stroke();
        ctx.restore();
      } else {
        const { w } = BLOCKER;
        roundRect(state.blockerX - w / 2, y - h / 2, w, h, 3);
        ctx.fillStyle = '#8a7a6a';
        ctx.fill();
        ctx.strokeStyle = C.gold;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      }
    }

    function updateParticles() {
      if (state.isPouring && state.gameState === 'PLAYING') spawnParticles();
      state.particles = state.particles.filter(p => {
        p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life++;
        if (lvl().blockerSpeed) {
          if (lvl().blockerMode === 'spin') {
            const dx = p.x - SPIN_CX;
            const dy = p.y - BLOCKER.y;
            if (Math.abs(dy) <= BLOCKER.h + 4) {
              const cos = Math.cos(-state.blockerAngle);
              const sin = Math.sin(-state.blockerAngle);
              const lx = dx * cos - dy * sin;
              const ly = dx * sin + dy * cos;
              if (Math.abs(lx) <= SPIN_ARM && Math.abs(ly) <= BLOCKER.h / 2 + 4) {
                spawnSplash(p.x, p.y);
                return false;
              }
            }
          } else {
            const bl = state.blockerX - BLOCKER.w / 2;
            const br = state.blockerX + BLOCKER.w / 2;
            if (p.y >= BLOCKER.y - 6 && p.y <= BLOCKER.y + 4 && p.x >= bl && p.x <= br) {
              spawnSplash(p.x, BLOCKER.y);
              return false;
            }
          }
        }
        if (state.gameState === 'PLAYING' &&
            p.y >= COLLECTOR.y && p.x >= COLLECTOR.x && p.x <= COLLECTOR.x + COLLECTOR.w) {
          spawnSplash(p.x, COLLECTOR.y);
          state.collectedLevel = Math.min(1, state.collectedLevel + lvl().rate / 2);
          if (state.collectedLevel >= 1) {
            state.gameState  = 'GAME_OVER';
            state.loseReason = 'tooMuch';
            state.isPouring  = false;
          }
          return false;
        }
        return p.life < p.maxLife;
      });
      state.splashes = state.splashes.filter(s => {
        s.r += (s.maxR - s.r) * 0.2; s.life++;
        return s.life < s.maxLife;
      });
    }

    function drawParticles() {
      state.particles.forEach(p => {
        const a = (1 - p.life / p.maxLife) * 0.7;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(126,200,227,${a.toFixed(2)})`;
        ctx.fill();
      });
      state.splashes.forEach(s => {
        const a = (1 - s.life / s.maxLife) * 0.8;
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.strokeStyle = `rgba(180,220,240,${a.toFixed(2)})`;
        ctx.lineWidth = 1.5;
        ctx.stroke();
      });
    }

    function drawStar(cx, cy, outerR, innerR, points) {
      ctx.beginPath();
      for (let i = 0; i < points * 2; i++) {
        const angle = (i * Math.PI) / points - Math.PI / 2;
        const r = i % 2 === 0 ? outerR : innerR;
        const m = i === 0 ? 'moveTo' : 'lineTo';
        ctx[m](cx + r * Math.cos(angle), cy + r * Math.sin(angle));
      }
      ctx.closePath();
    }

    function drawFace() {
      const { x, y, w, h } = CUP;
      const cx = x + w / 2;
      const fy = y + h * 0.67;
      const es = 12;

      let expr;
      if      (state.gameState === 'WIN')       expr = 'star';
      else if (state.gameState === 'GAME_OVER') expr = 'dizzy';
      else if (state.fillLevel >= 0.85)         expr = 'panic';
      else if (state.fillLevel >= 0.6)          expr = 'nervous';
      else                                       expr = 'happy';

      if (expr === 'star') {
        ctx.fillStyle = '#f0c030';
        drawStar(cx - es, fy - 5, 6, 3, 5); ctx.fill();
        drawStar(cx + es, fy - 5, 6, 3, 5); ctx.fill();
      } else if (expr === 'dizzy') {
        ctx.strokeStyle = '#333'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
        const d = 4;
        [[cx - es, fy - 6], [cx + es, fy - 6]].forEach(([ex, ey]) => {
          ctx.beginPath();
          ctx.moveTo(ex - d, ey - d); ctx.lineTo(ex + d, ey + d);
          ctx.moveTo(ex + d, ey - d); ctx.lineTo(ex - d, ey + d);
          ctx.stroke();
        });
      } else {
        ctx.fillStyle = '#333';
        ctx.beginPath();
        ctx.arc(cx - es, fy - 6, 4, 0, Math.PI * 2);
        ctx.arc(cx + es, fy - 6, 4, 0, Math.PI * 2);
        ctx.fill();
        if (expr === 'panic') {
          ctx.strokeStyle = '#333'; ctx.lineWidth = 1.5;
          ctx.beginPath();
          ctx.arc(cx - es, fy - 6, 6, 0, Math.PI * 2);
          ctx.arc(cx + es, fy - 6, 6, 0, Math.PI * 2);
          ctx.stroke();
        }
      }

      ctx.strokeStyle = '#444'; ctx.lineWidth = 2.5; ctx.lineCap = 'round';
      if (expr === 'happy' || expr === 'star') {
        ctx.beginPath();
        ctx.arc(cx, fy + 2, 9, 0, Math.PI);
        ctx.stroke();
        ctx.fillStyle = 'rgba(255,150,150,0.45)';
        ctx.beginPath(); ctx.ellipse(cx - 18, fy + 4, 7, 5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.ellipse(cx + 18, fy + 4, 7, 5, 0, 0, Math.PI * 2); ctx.fill();
      } else if (expr === 'nervous') {
        ctx.beginPath();
        ctx.moveTo(cx - 9, fy + 8);
        ctx.quadraticCurveTo(cx - 4, fy + 5, cx, fy + 8);
        ctx.quadraticCurveTo(cx + 4, fy + 11, cx + 9, fy + 8);
        ctx.stroke();
      } else if (expr === 'panic') {
        ctx.beginPath();
        ctx.arc(cx, fy + 9, 7, 0, Math.PI * 2);
        ctx.stroke();
      } else if (expr === 'dizzy') {
        ctx.beginPath();
        ctx.arc(cx, fy + 14, 9, Math.PI, 0);
        ctx.stroke();
      }
    }

    function resetLevel() {
      state.fillLevel       = 0;
      state.collectedLevel  = 0;
      state.gameState       = 'READY';
      state.isPouring       = false;
      state.loseReason      = '';
      state.particles       = [];
      state.splashes        = [];
      state.waveAmp         = 0;
      state.winTime         = 0;
      state.blockerX        = BLOCKER.minCX;
      state.blockerDir      = 1;
      state.blockerAngle    = 0;
    }

    function resetGame() {
      state.maxUnlocked    = readProgress();
      state.currentLevel   = 0;
      state.fillLevel      = 0;
      state.collectedLevel = 0;
      state.isPouring      = false;
      state.loseReason     = '';
      state.particles      = [];
      state.splashes       = [];
      state.waveAmp        = 0;
      state.winTime        = 0;
      state.gameState      = 'SELECT';
    }

    function nextLevel() {
      state.currentLevel++;
      resetLevel();
    }

    function getLogicalCoords(e) {
      const rect = canvas.getBoundingClientRect();
      const src = e.touches ? e.touches[0] : e;
      return {
        x: (src.clientX - rect.left) * (LW / rect.width),
        y: (src.clientY - rect.top)  * (LH / rect.height),
      };
    }

    const BTN_L = { x: LW/2 - 162, y: LH/2 + 50, w: 148, h: 48 };
    const BTN_R = { x: LW/2 + 14,  y: LH/2 + 50, w: 148, h: 48 };

    function isInRect(lx, ly, r) {
      return lx >= r.x && lx <= r.x + r.w && ly >= r.y && ly <= r.y + r.h;
    }

    function onPointerDown(e) {
      e.preventDefault();
      const { x: lx, y: ly } = getLogicalCoords(e);

      if (state.gameState === 'SELECT') {
        for (let i = 0; i < LEVELS.length; i++) {
          if (i <= state.maxUnlocked) {
            const { x, y, w, h } = tileRect(i);
            if (lx >= x && lx <= x + w && ly >= y && ly <= y + h) {
              state.currentLevel = i;
              resetLevel();
            }
          }
        }
        return;
      }

      if (state.gameState === 'WIN') {
        if (isInRect(lx, ly, BTN_L)) {
          state.currentLevel < LEVELS.length - 1 ? nextLevel() : resetGame();
        } else if (isInRect(lx, ly, BTN_R)) {
          state.gameState = 'SELECT';
        }
        return;
      }

      if (state.gameState === 'GAME_OVER') {
        if (isInRect(lx, ly, BTN_L)) resetLevel();
        else if (isInRect(lx, ly, BTN_R)) state.gameState = 'SELECT';
        return;
      }

      if (state.gameState === 'READY')   state.gameState = 'PLAYING';
      if (state.gameState === 'PLAYING') state.isPouring = true;
    }

    function checkWinLose() {
      if (state.gameState !== 'POURING') return;
      if (Math.abs(state.fillLevel - lvl().target) <= lvl().tolerance) {
        state.gameState = 'WIN';
        if (state.currentLevel + 1 > state.maxUnlocked) {
          state.maxUnlocked = state.currentLevel + 1;
          saveProgress(state.maxUnlocked);
        }
      } else {
        state.gameState  = 'GAME_OVER';
        state.loseReason = state.fillLevel < lvl().target ? 'tooLittle' : 'overflow';
      }
    }

    function onPointerUp(e) {
      e.preventDefault();
      if (state.gameState !== 'PLAYING' || !state.isPouring) return;
      state.isPouring = false;
      state.gameState = 'POURING';
    }

    canvas.addEventListener('mousedown',   onPointerDown);
    canvas.addEventListener('mouseup',     onPointerUp);
    canvas.addEventListener('mouseleave',  onPointerUp);
    canvas.addEventListener('touchstart',  onPointerDown, { passive: false });
    canvas.addEventListener('touchend',    onPointerUp,   { passive: false });
    canvas.addEventListener('touchcancel', onPointerUp,   { passive: false });

    function drawButton(x, y, w, h, label, color) {
      roundRect(x, y, w, h, 12);
      ctx.fillStyle = color;
      ctx.fill();
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 1;
      ctx.stroke();
      ctx.font = 'bold 18px sans-serif';
      ctx.fillStyle = '#fff';
      ctx.textAlign = 'center';
      ctx.fillText(label, x + w / 2, y + h / 2 + 7);
    }

    function drawUI() {
      if (state.gameState === 'SELECT') { drawLevelSelect(); return; }
      ctx.font = 'bold 20px sans-serif';
      ctx.fillStyle = C.text;
      ctx.textAlign = 'center';
      ctx.fillText('Level ' + (state.currentLevel + 1), LW / 2, 44);

      if (state.gameState === 'READY') {
        const a = 0.5 + 0.5 * Math.sin(state.time * 3);
        ctx.globalAlpha = a;
        ctx.font = '16px sans-serif';
        ctx.fillStyle = C.text;
        ctx.textAlign = 'center';
        ctx.fillText('按住螢幕開始注水', LW / 2, LH - 70);
        ctx.globalAlpha = 1;
      }

      if (state.gameState === 'WIN') {
        ctx.fillStyle = 'rgba(245,240,235,0.88)';
        ctx.fillRect(0, 0, LW, LH);
        ctx.font = 'bold 52px sans-serif';
        ctx.fillStyle = C.text;
        ctx.textAlign = 'center';
        const isLastLevel = state.currentLevel >= LEVELS.length - 1;
        ctx.fillText(isLastLevel ? '全部過關！' : '完成！', LW / 2, LH / 2 - 30);
        ctx.font = '22px sans-serif';
        ctx.fillStyle = '#8a7a6a';
        ctx.fillText(isLastLevel ? '你是接水大師 🏆' : '精準到位 🎉', LW / 2, LH / 2 + 20);
        const btnLabel = isLastLevel ? '再玩一次' : '下一關 →';
        drawButton(BTN_L.x, BTN_L.y, BTN_L.w, BTN_L.h, btnLabel, '#7ec8e3');
        drawButton(BTN_R.x, BTN_R.y, BTN_R.w, BTN_R.h, '選關', '#a0c0d8');
      }

      if (state.gameState === 'GAME_OVER') {
        ctx.fillStyle = 'rgba(245,240,235,0.88)';
        ctx.fillRect(0, 0, LW, LH);
        ctx.font = 'bold 52px sans-serif';
        ctx.fillStyle = '#c05050';
        ctx.textAlign = 'center';
        const title = state.loseReason === 'tooLittle' ? '水太少了！' : '水滿了！';
        const hint  = state.loseReason === 'tooLittle' ? '多撐一會兒' : '放手快一點';
        ctx.fillText(title, LW / 2, LH / 2 - 30);
        ctx.font = '22px sans-serif';
        ctx.fillStyle = '#8a7a6a';
        ctx.fillText(hint, LW / 2, LH / 2 + 20);
        drawButton(BTN_L.x, BTN_L.y, BTN_L.w, BTN_L.h, '再試一次', '#e07070');
        drawButton(BTN_R.x, BTN_R.y, BTN_R.w, BTN_R.h, '選關', '#c08080');
      }
    }

    function loop() {
      state.time += 1 / 60;
      if (state.gameState !== 'SELECT') {
        updateWater();
        updateBlocker();
        updateParticles();
      }
      ctx.clearRect(0, 0, LW, LH);
      drawBackground();

      if (state.gameState !== 'SELECT') {
        drawMachine();
        drawSlide();

        const bounceY = state.gameState === 'WIN'
          ? -Math.abs(Math.sin(state.winTime * 8)) * 10
          : 0;

        ctx.save();
        ctx.translate(0, bounceY);
        const cup = lvl().cup;
        drawCupFill(cup);
        drawWater(cup);
        drawBlocker();
        drawParticles();
        drawCupBorder(cup);
        drawTargetLine(cup);
        drawFace();
        ctx.restore();
      }

      drawUI();
      requestAnimationFrame(loop);
    }
    loop();
  </script>
</body>
</html>
